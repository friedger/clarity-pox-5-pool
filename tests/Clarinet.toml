## STATUS (unfinished — see NEXT STEPS below before relying on `npm test`)
##
## Goal: root Clarinet.toml is the deployment default (remote_data + live
## testnet addresses); this file is meant to be a separate, fully-local
## manifest so `npm test` never depends on network access.
##
## Confirmed working: vendoring pox-5 + the sBTC suite locally (tests/vendor/)
## under emulated-senders matching their literal hardcoded addresses resolves
## the "undeclared trait <sip-010-trait>" error that a mixed remote_data/local
## setup hit (see git history / session notes for the full trace).
##
## Still blocked (pre-existing issues, NOT introduced by this manifest):
## 1. `pool.clar`'s `rv-wire` fails WHOLE-PROJECT analysis ("unresolved
##    contract 'vault-1'") even though `clarinet check contracts/pool.clar`
##    (single-file, via remote_data) passes clean. This blocks `initSimnet()`
##    -> blocks `npm test` -- with EITHER manifest, root or this one. Root
##    cause not yet found; likely needs `rv-wire`/pool.clar restructuring, or
##    a Clarinet-side fix/workaround for how it resolves `.vault-1` inside a
##    function referenced only via `#[env(simnet)]`.
## 2. The Clarinet SDK aggressively regenerates tests/deployments/*.yaml on
##    every `initSimnet()` call, discarding the custom `emulated-sender`
##    values below (needed so vendored pox-5/sbtc-token land at the literal
##    testnet addresses the contracts hardcode) and reassigning everything to
##    the plain deployer address instead. Declining the interactive
##    "Overwrite? [Y/n]" prompt in `clarinet console` did NOT prevent this.
##    No workaround found yet -- worth checking for a clarinet-sdk flag/env
##    var to disable plan auto-regeneration, or pinning an older sdk version.
##
## vitest.config.ts does NOT yet point at this manifest (still defaults to
## ./Clarinet.toml) -- that wiring is trivial (override `manifestPath` in
## environmentOptions.clarinet) but was left undone since tests can't pass
## until the two blockers above are resolved.

[project]
name = "clarity-pox-5-pool-tests"
description = "Fully-local (no remote_data) manifest for the vitest unit test suite. Unlike the root Clarinet.toml (the deployment default, which targets the live private testnet node via remote_data + hardcoded testnet addresses), this manifest vendors local copies of pox-5 and the sBTC suite so `npm test` never depends on network access."
authors = []
telemetry = false
cache_dir = "../.cache"

# vault.clar / pool.clar / signer-manager.clar hardcode the LIVE testnet
# principals directly (not deployer-relative, not a [[project.requirements]]
# reference), so they aren't remappable by Clarinet's usual mainnet ->
# testnet requirement remapping. To resolve locally, these vendored copies
# (fetched from the live node, see tests/vendor/) are published in
# tests/deployments/default.simnet-plan.yaml under emulated-senders that
# match those literal addresses exactly:
#   pox-5                                -> ST000000000000000000002AMW42H
#   sbtc-token / sbtc-registry / sbtc-withdrawal -> SN3R84XZYA63QS28932XQF3G1J8R9PC3W76P9CSQS
[contracts.pox-5]
path = "vendor/pox-5.clar"
clarity_version = 6
epoch = "4.0"

[contracts.sbtc-token]
path = "vendor/sbtc-token.clar"
clarity_version = 6
epoch = "4.0"

[contracts.sbtc-registry]
path = "vendor/sbtc-registry.clar"
clarity_version = 6
epoch = "4.0"

[contracts.sbtc-withdrawal]
path = "vendor/sbtc-withdrawal.clar"
clarity_version = 6
epoch = "4.0"

# The SIP-010 trait pool.clar implements IS genuinely mainnet-hosted, so this
# one legitimately resolves via [[project.requirements]].
[[project.requirements]]
contract_id = "SP3FBR2AGK5H9QBDH3EEN6DF8EK8JY7RX8QJ5SVTE.sip-010-trait-ft-standard"

[contracts.vault-trait]
path = "../contracts/vault-trait.clar"
clarity_version = 6
epoch = "4.0"

[contracts.vault-1]
path = "../contracts/vault.clar"
clarity_version = 6
epoch = "4.0"

[contracts.vault-2]
path = "../contracts/vault.clar"
clarity_version = 6
epoch = "4.0"

[contracts.pool]
path = "../contracts/pool.clar"
clarity_version = 6
epoch = "4.0"

[contracts.signer-manager-1]
path = "../contracts/signer-manager.clar"
clarity_version = 6
epoch = "4.0"

[contracts.signer-manager-2]
path = "../contracts/signer-manager.clar"
clarity_version = 6
epoch = "4.0"

[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }
